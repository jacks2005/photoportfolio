    <script>
        (function() {
            var states = [null, 'light', 'dark'];

            function getStored() { return localStorage.getItem('theme'); }

            function applyTheme(theme) {
                var root = document.documentElement;
                if (theme) root.setAttribute('data-theme', theme);
                else root.removeAttribute('data-theme');
                updateSwitchUI(theme);
            }

            function updateSwitchUI(theme) {
                var sw = document.getElementById('theme-switch');
                var slider = document.getElementById('theme-slider');
                if (!sw || !slider) return;
                var idx = states.indexOf(theme);
                if (idx < 0) idx = 0;
                var opts = sw.querySelectorAll('.theme-option');
                opts.forEach(function(opt, i) {
                    opt.classList.toggle('active', i === idx);
                });
                var swRect = sw.getBoundingClientRect();
                var optRect = opts[idx].getBoundingClientRect();
                slider.style.left = (optRect.left - swRect.left) + 'px';
                slider.style.width = optRect.width + 'px';
            }

            window.addEventListener('resize', function() { updateSwitchUI(getStored()); });

            window.addEventListener('load', function() {
                requestAnimationFrame(function() {
                    requestAnimationFrame(function() {
                        document.documentElement.removeAttribute('data-no-transition');
                    });
                });
            });

            applyTheme(getStored());

            document.querySelectorAll('.theme-option').forEach(function(opt) {
                opt.addEventListener('click', function() {
                    var val = opt.getAttribute('data-theme-val');
                    var theme = val === 'null' ? null : val;
                    if (theme) localStorage.setItem('theme', theme);
                    else localStorage.removeItem('theme');
                    applyTheme(theme);
                });
            });

            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
                if (!getStored()) applyTheme(null);
            });

            (function() {
                var hamburger = document.getElementById('hamburger');
                var topnav = document.getElementById('topnav');
                if (!hamburger || !topnav) return;

                function closeMenu() {
                    topnav.classList.remove('open');
                    hamburger.setAttribute('aria-expanded', 'false');
                    hamburger.querySelector('.material-symbols-outlined').textContent = 'menu';
                    hamburger.setAttribute('aria-label', 'Open menu');
                }

                hamburger.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var isOpen = topnav.classList.toggle('open');
                    hamburger.setAttribute('aria-expanded', isOpen);
                    hamburger.querySelector('.material-symbols-outlined').textContent = isOpen ? 'close' : 'menu';
                    hamburger.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
                    if (isOpen) updateSwitchUI(getStored());
                });

                document.addEventListener('click', function(e) {
                    if (!topnav.contains(e.target) && !hamburger.contains(e.target)) closeMenu();
                });

                window.addEventListener('resize', function() {
                    if (window.innerWidth >= 860) closeMenu();
                });
            })();
        })();
    </script>
